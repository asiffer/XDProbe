{{define "body"}}
<main
  class="h-full w-full flex flex-row items-center justify-center bg-muted text-foreground"
>
  <div class="w-full max-w-sm shadow rounded-lg bg-background p-6">
    <hgroup class="w-full flex flex-col gap-0">
      <h2 class="font-semibold text-foreground">Login</h2>
      <p class="text-sm text-muted-foreground">
        Enter your credentials to access the dashboard.
      </p>
    </hgroup>
    <form class="flex flex-col gap-4 mt-6 text-sm" method="post">
      <fieldset class="w-full flex flex-row gap-4 items-center">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          class="h-4 w-4"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          class="lucide lucide-user-icon lucide-user"
        >
          <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2" />
          <circle cx="12" cy="7" r="4" />
        </svg>
        <input
          type="text"
          id="username"
          name="username"
          class="h-9 w-full rounded-md border border-muted outline-none focus:border-foreground px-3 py-1 invalid:not(:placeholder-shown)]:border-destructive hover:border-foreground/20 transition-colors duration-100"
          required
          placeholder="Username"
        />
      </fieldset>
      <fieldset class="w-full flex flex-row gap-4 items-center">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          class="h-4 w-4"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          class="lucide lucide-key-round-icon lucide-key-round"
        >
          <path
            d="M2.586 17.414A2 2 0 0 0 2 18.828V21a1 1 0 0 0 1 1h3a1 1 0 0 0 1-1v-1a1 1 0 0 1 1-1h1a1 1 0 0 0 1-1v-1a1 1 0 0 1 1-1h.172a2 2 0 0 0 1.414-.586l.814-.814a6.5 6.5 0 1 0-4-4z"
          />
          <circle cx="16.5" cy="7.5" r=".5" fill="currentColor" />
        </svg>
        <input
          type="password"
          id="password"
          name="password"
          class="h-9 w-full rounded-md border border-muted outline-none focus:border-foreground px-3 py-1 invalid:not(:placeholder-shown)]:border-destructive hover:border-foreground/20 transition-colors duration-100"
          placeholder="Password"
          required
        />
      </fieldset>
      <button
        class="rounded py-1 px-4 shadow self-end bg-foreground text-background hover:bg-foreground/90"
      >
        Sign In
      </button>
    </form>
  </div>
</main>
{{end}}
